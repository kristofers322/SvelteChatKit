version: '3.8'

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BACKEND_CUSTOM_URL=${BACKEND_CUSTOM_URL}
        - FRONTEND_CUSTOM_URL=${FRONTEND_CUSTOM_URL}
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT}
      - BACKEND_CUSTOM_URL=${BACKEND_CUSTOM_URL}
      - FRONTEND_CUSTOM_URL=${FRONTEND_CUSTOM_URL}
    ports:
      - "${FRONTEND_PORT}:5000"
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT}:3000"
    environment:
      - PORT=${BACKEND_PORT}
      - BACKEND_CUSTOM_URL=${BACKEND_CUSTOM_URL}
      - DIFY_API_KEY=${DIFY_API_KEY}
      - ALLOWED_DOMAINS=${ALLOWED_DOMAINS}
      - NODE_ENV=${NODE_ENV:-production}
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret}
      - SERVICES_API_TOKEN=${SERVICES_API_TOKEN}
      - SERVICES_ENPOINT=${SERVICES_ENPOINT}
      - PROJECT_ID=${PROJECT_ID}
      - CHATBOT_ID=${CHATBOT_ID}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "${FRONTEND_STATIC_PORT}:80"
    environment:
      - FRONTEND_CUSTOM_URL=${FRONTEND_CUSTOM_URL}
    volumes:
      - /usr/share/nginx/html

networks:
  default:
    name: chat-widget-network
